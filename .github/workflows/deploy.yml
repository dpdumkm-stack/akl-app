name: Deploy Apindo App

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dpdumkm-stack/akl-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Zero-Downtime Deploy via SSH
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            # Masuk ke folder proyek
            cd /var/www/akl-app

            # Anti-Error 128 (Git Dubious Ownership)
            git config --global --add safe.directory /var/www/akl-app

            # Ambil kode terbaru (untuk docker-compose.yml & deploy script)
            git pull origin main

            # Login ke GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pre-pull image baru (agar start kontainer lebih cepat)
            echo "🚀 Menarik image terbaru..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Pastikan script executable
            chmod +x deploy-zero-downtime.sh

            # Jalankan Blue-Green Zero-Downtime Deployment
            echo "🔄 Memulai Zero-Downtime Deployment..."
            ./deploy-zero-downtime.sh

            echo "✨ Pipeline Deployment Selesai!"
