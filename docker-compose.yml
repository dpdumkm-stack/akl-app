services:
  akl-app:
    build: .
    container_name: akl-quotation-system
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - NEXTAUTH_SECRET=akl-studio-secret-key-2026-secure
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      - ./prisma:/app/prisma
