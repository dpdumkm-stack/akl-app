name: Deploy Apindo App

on:
  push:
    branches:
      - main

env:
  # Memaksa GitHub menggunakan Node 24 (Sesuai peringatan terbaru)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # Masuk ke folder proyek
            cd /var/www/akl-app
            
            # Anti-Error 128 (Git Dubious Ownership)
            git config --global --add safe.directory /var/www/akl-app
            
            # Ambil kode terbaru
            git pull origin main
            
            # Bangun ulang container (database tetap aman karena pakai volumes)
            docker-compose up -d --build --force-recreate
            
            echo "✨ Deployment Selesai & Berhasil!"
